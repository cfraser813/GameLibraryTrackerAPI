<html>
    <head>
        <title>Game Library Tracker</title>
    </head>
    <body>
        <h2>Add a Game</h2>
        <input type="text" id="title" placeholder="Title" />
        <input type="text" id="genre" placeholder="Genre" />
        <input type="text" id="platform" placeholder="Platform" />
        <input type="number" id="releaseYear" placeholder="Release Year" />
        <button onclick="addGame()",>Add Game</button>

        <script>
            //read
            function loadGames() {
                fetch('https://localhost:7256/api/Games')
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('games-list');
                    container.innerHTML = '';
                    data.forEach(game => {
                        const div = document.createElement('div');
                        div.innerHTML = `
                            <h3>${game.title}</h3>
                            <p>Genre: ${game.genre}</p>
                            <p>Platform: ${game.platform}</p>
                            <p>Release Year: ${game.releaseYear}</p>
                            <button onclick="deleteGame(${game.id})">Delete</button>
                            <hr>
                        `;
                        container.appendChild(div);
                    });
                })
            }

            loadGames();
            
            function addGame() {
                const game = {
                    title: document.getElementById('title').value,
                    genre: document.getElementById('genre').value,
                    platform: document.getElementById('platform').value,
                    releaseYear: parseInt(document.getElementById('releaseYear').value)
                };
                fetch('https://localhost:7256/api/Games', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(game)
                })
                    .then(response => response.json())
                    .then(data => {
                        console.log('Game added!', data);
                        loadGames();
                        document.getElementById('title').value = '';
                        document.getElementById('genre').value = '';
                        document.getElementById('platform').value = '';
                        document.getElementById('releaseYear').value = '';
                    })
            }

            function deleteGame(ID) {
                fetch(`https://localhost:7256/api/Games/${ID}`, {
                    method: 'DELETE'
                })
                .then(() => loadGames());
            }
        </script>
        <div id="games-list"></div>
    </body>
</html>
